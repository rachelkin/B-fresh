<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-FRESH</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <h2>כניסה למערכת B-FRESH</h2>
        <label for="name">שם משתמש:</label>
        <input type="text" id="name" name="name" placeholder="הכנס שם מלא" required>

        <label for="password">סיסמת משתמש:</label>
        <input type="password" id="password" name="password" pattern="[0-9]{4}" placeholder="הכנס 4 ספרות קוד">

        <button >כניסה</button>
    </div>
    <script type="module"  src="login.js"></script>    
</body>
</html>
